kind = "web"
previewPath = "/"
title = "Neon Air Draw"
version = "1.0.0"
id = "artifacts/neon-air-draw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25697

[services.development]
run = "pnpm --filter @workspace/neon-air-draw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neon-air-draw", "run", "build" ]
publicDir = "artifacts/neon-air-draw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25697"
BASE_PATH = "/"
